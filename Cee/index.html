<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceething</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Makes Website transparent for OBS */
        body {
            background-color: transparent;
        }
        .slideshow-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 500px;
        }
        img {
            filter: invert(100%);
        }
    </style>
</head>
<body class="bg-transparent font-sans text-white">
    <div class="slideshow-container">
        <!-- Image container -->
        <div class="w-full flex flex-col items-center">
            <img id="slideshow-image" style="max-width:100%; max-height:60vh; height:auto;" class="object-contain shadow-lg transition-opacity duration-1000 ease-in-out opacity-0" src="" alt="Slideshow Image">
            <!-- Artist's name container -->
            <div class="mt-2 px-4 py-2 bg-black/50 rounded-lg w-fit">
                <p id="artist-name" class="text-xl font-bold" style="font-size:32px;"></p>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
                        // Get hex color from URL hash (e.g., #Hex-FF0000)
                        function getTextColorFromHash() {
                            const hash = window.location.hash;
                            const match = hash.match(/^#Hex-([A-Fa-f0-9]{6})$/);
                            if (match) {
                                return `#${match[1]}`;
                            }
                            return null;
                        }
            const imageEl = document.getElementById('slideshow-image');
            const artistEl = document.getElementById('artist-name');
            let images = [];
            let currentIndex = 0;

            const JSON_FILE_PATH = 'CeeFanArtReel.json';
            const DISPLAY_DURATION_MS = 5000;
            const TRANSITION_DURATION_MS = 1000;
            const AUDIO_FILES = ['1.mp3', '2.mp3'];
            const AUDIO_INTERVAL_MS = 120000;
            const SPECIAL_IMAGE_URL = 'cielknows.webp';
            const SPECIAL_IMAGE_ARTIST = '???';
            const SPECIAL_IMAGE_EVERY = 5;
            const SPECIAL_IMAGE_2_URL = 'cielknows2.webp';
            const SPECIAL_IMAGE_2_ARTIST = '???';
            const SPECIAL_IMAGE_2_EVERY = 20;
            const audioEl = new Audio();
            audioEl.preload = 'auto';
            let audioLoopStarted = false;

            function updateSlideshow() {
                imageEl.classList.remove('opacity-100');
                imageEl.classList.add('opacity-0');

                setTimeout(() => {
                    if (images.length === 0) return;
                    const currentImage = images[currentIndex];
                    imageEl.src = currentImage.image_url;
                    artistEl.textContent = currentImage.Artist;
                    const isFilterImmune = currentImage.image_url === SPECIAL_IMAGE_URL || currentImage.image_url === SPECIAL_IMAGE_2_URL;
                    imageEl.style.filter = isFilterImmune ? 'none' : 'invert(100%)';

                    // Set text color from URL hash if present
                    const color = getTextColorFromHash();
                    artistEl.style.color = color ? color : '';

                    imageEl.onload = () => {
                        imageEl.classList.remove('opacity-0');
                        imageEl.classList.add('opacity-100');
                    };
                    currentIndex = (currentIndex + 1) % images.length;
                }, TRANSITION_DURATION_MS);
            }

            function insertSpecialImageEveryN(baseImages, specialImage, everyN) {
                if (!Number.isInteger(everyN) || everyN <= 0) {
                    return baseImages;
                }

                const merged = [];
                for (let i = 0; i < baseImages.length; i++) {
                    merged.push(baseImages[i]);
                    if ((i + 1) % everyN === 0) {
                        merged.push(specialImage);
                    }
                }
                return merged;
            }

            function playRandomAudio() {
                if (AUDIO_FILES.length === 0) return Promise.resolve();

                const randomFile = AUDIO_FILES[Math.floor(Math.random() * AUDIO_FILES.length)];
                if (!audioEl.paused) {
                    audioEl.pause();
                }
                audioEl.src = randomFile;
                audioEl.currentTime = 0;
                return audioEl.play();
            }

            async function startAudioLoop() {
                if (audioLoopStarted) return;

                try {
                    await playRandomAudio();
                    audioLoopStarted = true;
                    setInterval(() => {
                        playRandomAudio().catch(error => {
                            console.warn('Audio playback blocked or failed:', error);
                        });
                    }, AUDIO_INTERVAL_MS);
                } catch (error) {
                    console.warn('Autoplay blocked. Waiting for user interaction.', error);
                }
            }

            function setupAudioUnlock() {
                const unlockAudio = () => {
                    startAudioLoop();
                };

                ['click', 'touchstart', 'keydown'].forEach(eventName => {
                    window.addEventListener(eventName, unlockAudio, { once: true });
                });
            }

            // Fetch the JSON data
            fetch(JSON_FILE_PATH)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(jsonData => {
                    // jsonData is an object with keys IMG1, IMG2, ...
                    const baseImages = [];
                    for (const key in jsonData) {
                        if (jsonData.hasOwnProperty(key)) {
                            const entry = jsonData[key];
                            if (entry.Artist && entry.image_url) {
                                baseImages.push({
                                    Artist: entry.Artist,
                                    image_url: entry.image_url
                                });
                            }
                        }
                    }

                    const imagesWithFirstSpecial = insertSpecialImageEveryN(
                        baseImages,
                        {
                            Artist: SPECIAL_IMAGE_ARTIST,
                            image_url: SPECIAL_IMAGE_URL
                        },
                        SPECIAL_IMAGE_EVERY
                    );

                    images = insertSpecialImageEveryN(
                        imagesWithFirstSpecial,
                        {
                            Artist: SPECIAL_IMAGE_2_ARTIST,
                            image_url: SPECIAL_IMAGE_2_URL
                        },
                        SPECIAL_IMAGE_2_EVERY
                    );

                    if (images.length > 0) {
                        updateSlideshow();
                        setInterval(updateSlideshow, DISPLAY_DURATION_MS + TRANSITION_DURATION_MS);
                        setupAudioUnlock();
                        startAudioLoop();
                    } else {
                        console.error("The JSON file is empty or formatted incorrectly.");
                        artistEl.textContent = 'No images found.';
                    }
                })
                .catch(error => {
                    console.error('Error with fetching or parsing:', error);
                    artistEl.textContent = 'Error loading images.';
                });
        };
    </script>
</body>
</html>
